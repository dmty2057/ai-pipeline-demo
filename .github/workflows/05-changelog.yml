name: Auto CHANGELOG
# claude-code-action не підтримує подію push, тож "після мержу в main"
# реалізуємо через pull_request: closed з перевіркою merged == true.
on:
  pull_request:
    types: [closed]
permissions:
  contents: write
  id-token: write
jobs:
  changelog:
    if: ${{ github.event.pull_request.merged == true }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Подивись на git-коміти від попереднього тега (або останні 20 комітів,
            якщо тега немає). Сформуй короткий запис CHANGELOG, згрупований у
            "Features" і "Fixes". Додай його на ПОЧАТОК файлу CHANGELOG.md
            (створи файл, якщо його немає).
            ВАЖЛИВО: лише онови файл CHANGELOG.md у робочій теці — НЕ роби git commit
            і git push самостійно, це зробить окремий крок workflow.
          claude_args: |
            --max-turns 30
            --allowedTools "Bash(git log:*),Bash(git describe:*),Bash(git tag:*),Bash(git diff:*),Bash(git show:*),Read,Write,Edit"
      - name: Commit changelog to main
        run: |
          if git diff --quiet -- CHANGELOG.md && ! git ls-files --others --exclude-standard CHANGELOG.md | grep -q .; then
            echo "Немає змін у CHANGELOG.md — нічого комітити"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "docs: update changelog"
          git push origin main
