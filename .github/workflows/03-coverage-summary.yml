name: Coverage Summary
on:
  pull_request:
    types: [opened, synchronize]
permissions:
  contents: read
  pull-requests: write
  id-token: write
jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pytest pytest-cov
      # ганяємо тести з покриттям; || true щоб крок не впав і ми все одно прокоментували
      - run: python -m pytest --cov=demo --cov-report=json --cov-report=term || true
      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Прочитай звіт покриття у coverage.json (структура pytest-cov:
            files[*].summary та files[*].missing_lines).
            Людською мовою скажи рев'юерам PR #${{ github.event.pull_request.number }}:
            - що покрито добре
            - які ВАЖЛИВІ шляхи НЕ покриті і чому це ризик
            Коротко. Не вивалюй сирі числа.
            Залиш це ОДНИМ коментарем у PR командою:
            gh pr comment ${{ github.event.pull_request.number }} --body "<твій текст>"
          claude_args: |
            --max-turns 15
            --allowedTools "Bash(gh pr comment:*)"
